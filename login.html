<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FinTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="login-container">
    <div class="login-card">
        <div class="ft-logo-wrapper">
            <img src="assets/ft_logo-full.png" alt="FinTrack Logo" class="login-logo-img">
        </div>

        <div class="features">
            <div class="feature-item">
                <span class="feature-dot" style="background:#4f8ef7;"></span>
                Log & categorize every transaction
            </div>
            <div class="feature-item">
                <span class="feature-dot" style="background:#2dd4a0;"></span>
                Automated insights & spending trends
            </div>
            <div class="feature-item">
                <span class="feature-dot" style="background:#9b7ef8;"></span>
                Historical evolution dashboard
            </div>
        </div>

        <div class="divider"><span>continue with</span></div>

        <div class="error-toast" id="error-toast"></div>

        <button id="btn-google" class="btn-google">
            <!-- Google "G" logo SVG -->
            <svg class="google-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z" fill="#34A853"/>
                <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332Z" fill="#FBBC05"/>
                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z" fill="#EA4335"/>
            </svg>
            <div class="spinner"></div>
            <span class="btn-label">Sign in with Google</span>
        </button>

        <p class="login-footer">
            By signing in, you agree to our
            <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.<br>
            Your data is encrypted and never sold.
        </p>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
    const btn = document.getElementById('btn-google');
    const toast = document.getElementById('error-toast');

    function showError(msg) {
        toast.textContent = '⚠ ' + msg;
        toast.classList.add('visible');
        btn.classList.remove('loading');
    }

    btn.addEventListener('click', async () => {
        toast.classList.remove('visible');
        btn.classList.add('loading');

        const { error } = await _supabase.auth.signInWithOAuth({
            provider: 'google',
            options: {
                redirectTo: window.location.origin + '/index.html'
            }
        });

        if (error) showError('Login failed: ' + error.message);
    });
</script>
</body>
</html>
